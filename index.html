<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>資產負債組合</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html{overflow-y:scroll}
body{background:#f5f5f5;font-family:-apple-system,BlinkMacSystemFont,sans-serif;color:#1c1c1e}
input,select,button{font-family:inherit}
input:focus,select:focus{outline:2px solid #F5B731;outline-offset:-1px}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-thumb{background:#ddd;border-radius:3px}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

const C = {
  bg:'#f5f5f5', card:'#fff', card2:'#f7f7f7', border:'#efefef',
  txt:'#1c1c1e', muted:'#8e8e93', faint:'#b0b0b5',
  yellow:'#F5B731', yellowLight:'#FEF3D0', yellowDark:'#C8901A',
  green:'#34c759', red:'#ff3b30', blue:'#007AFF',
  purple:'#af52de', orange:'#ff9500',
  greenBg:'#e9faf0', redBg:'#fff0ee',
  shadow:'0 2px 12px rgba(0,0,0,0.07)', shadowSm:'0 1px 4px rgba(0,0,0,0.05)',
};
const FUT_SPOT = { TX:'IX0001', MTX:'IX0001', TE:'IX0002', TF:'IX0004' };
const SK = {
  s:'ptf:s', f:'ptf:f', c:'ptf:c', l:'ptf:l', o:'ptf:o',
  key:'ptf:key', gas:'ptf:gas', r:'ptf:r',
  gh:'ptf:gh', gist:'ptf:gist', rates:'ptf:rates', auto:'ptf:auto',
};
const DEF_RATES = { USD:32, HKD:4.1, EUR:35, JPY:0.22 };
const GFILE = 'portfolio-data.json';
const CCY_OPTS = [['TWD','🇹🇼 TWD'],['USD','🇺🇸 USD'],['HKD','🇭🇰 HKD'],['EUR','🇪🇺 EUR'],['JPY','🇯🇵 JPY']];
const RANGES = [
  {k:'1M',label:'1M',days:30},{k:'3M',label:'3M',days:90},
  {k:'6M',label:'6M',days:180},{k:'1Y',label:'1Y',days:365},{k:'ALL',label:'全部',days:null},
];
const PAGE_SIZE = 15;

const ls = {
  get: k=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):null;}catch{return null;}},
  set: (k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch{}},
};

function fmt(n,d=0){if(n==null||isNaN(n))return'—';return n.toLocaleString('zh-TW',{minimumFractionDigits:d,maximumFractionDigits:d});}
function Pnl({v,d=0}){
  if(v==null||isNaN(v))return<span style={{color:C.muted}}>—</span>;
  return<span style={{color:v>=0?C.green:C.red,fontWeight:700}}>{v>=0?'+':''}{fmt(v,d)}</span>;
}
function calcNW(stocks,futures,cash,liabilities,otherAssets,rates){
  const toT=(a,c)=>c==='TWD'?a:a*(rates[c]||1);
  const sv=stocks.reduce((s,x)=>s+toT((x.px??x.cost)*x.qty,x.market==='US'?'USD':'TWD'),0);
  const fm=futures.reduce((s,f)=>s+(f.margin||0),0);
  const fp=futures.filter(f=>f.px!=null).reduce((s,f)=>s+(f.dir==='long'?1:-1)*(f.px-f.entry)*f.lots*f.mult,0);
  const cv=cash.reduce((s,c)=>s+toT(c.amount,c.ccy),0);
  const ov=otherAssets.reduce((s,o)=>s+toT(o.amount,o.ccy),0);
  const ta=sv+fm+fp+cv+ov;
  const tl=liabilities.reduce((s,l)=>s+toT(l.amount,l.ccy),0);
  return{ta,tl,nw:ta-tl};
}

// ── Primitives ────────────────────────────────
function PageHeader({title,sub}){return(<div style={{padding:'28px 20px 8px'}}><div style={{fontSize:32,fontWeight:800,letterSpacing:-0.5}}>{title}</div>{sub&&<div style={{fontSize:14,color:C.muted,marginTop:2}}>{sub}</div>}</div>);}
function Card({children,style={},onClick}){return(<div onClick={onClick} style={{background:C.card,borderRadius:18,padding:'16px 18px',marginBottom:12,boxShadow:C.shadow,cursor:onClick?'pointer':'default',...style}}>{children}</div>);}
function Div(){return<div style={{height:1,background:C.border,margin:'0 -18px'}}/>;}
function Pill({label}){return<span style={{background:C.yellowLight,color:C.yellowDark,borderRadius:20,fontSize:11,padding:'3px 10px',fontWeight:700}}>{label}</span>;}
function Btn({children,onClick,color=C.yellow,tc='#1c1c1e',disabled=false,style={}}){return(<button onClick={disabled?undefined:onClick} disabled={disabled} style={{border:'none',borderRadius:14,padding:'12px 20px',cursor:disabled?'not-allowed':'pointer',background:disabled?C.border:color,color:disabled?C.muted:tc,fontSize:15,fontWeight:700,opacity:disabled?0.5:1,...style}}>{children}</button>);}
function GBtn({children,onClick,color=C.yellow,disabled=false,style={}}){return(<button onClick={disabled?undefined:onClick} style={{border:`2px solid ${disabled?C.border:color}`,borderRadius:14,padding:'11px 18px',cursor:disabled?'not-allowed':'pointer',background:'transparent',color:disabled?C.muted:color,fontSize:14,fontWeight:700,opacity:disabled?0.5:1,...style}}>{children}</button>);}
function Field({label,value,onChange,type='text',placeholder='',hint,suffix,pw=false}){return(<div style={{marginBottom:16}}><div style={{fontSize:12,color:C.muted,marginBottom:6,fontWeight:700,textTransform:'uppercase',letterSpacing:0.5}}>{label}</div><div style={{position:'relative'}}><input type={pw?'password':type} value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} style={{width:'100%',background:C.card2,border:`1.5px solid ${C.border}`,borderRadius:12,padding:'12px 14px',color:C.txt,fontSize:15,paddingRight:suffix?52:14}}/>{suffix&&<span style={{position:'absolute',right:14,top:'50%',transform:'translateY(-50%)',color:C.muted,fontSize:13,fontWeight:600}}>{suffix}</span>}</div>{hint&&<div style={{fontSize:12,color:C.faint,marginTop:5,lineHeight:1.4}}>{hint}</div>}</div>);}
function Sel({label,value,onChange,opts}){return(<div style={{marginBottom:16}}><div style={{fontSize:12,color:C.muted,marginBottom:6,fontWeight:700,textTransform:'uppercase',letterSpacing:0.5}}>{label}</div><select value={value} onChange={e=>onChange(e.target.value)} style={{width:'100%',background:C.card2,border:`1.5px solid ${C.border}`,borderRadius:12,padding:'12px 14px',color:C.txt,fontSize:15}}>{opts.map(([v,l])=><option key={v} value={v}>{l}</option>)}</select></div>);}
function Modal({title,children,onClose}){return(<div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.45)',display:'flex',alignItems:'flex-end',justifyContent:'center',zIndex:200}}><div style={{background:C.card,borderRadius:'24px 24px 0 0',padding:'0 20px 32px',width:'100%',maxWidth:520,maxHeight:'93vh',overflowY:'auto'}}><div style={{width:40,height:5,background:'#ddd',borderRadius:3,margin:'14px auto 0'}}/><div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'18px 0 16px'}}><div style={{fontWeight:800,fontSize:20}}>{title}</div><button onClick={onClose} style={{background:C.card2,border:'none',borderRadius:'50%',width:32,height:32,cursor:'pointer',fontSize:17,color:C.muted,display:'flex',alignItems:'center',justifyContent:'center',fontWeight:700}}>×</button></div>{children}</div></div>);}
function Chips({items,selected,onSelect,color=C.yellow}){return(<div style={{display:'flex',flexWrap:'wrap',gap:8,marginBottom:18}}>{items.map(v=>(<button key={v} onClick={()=>onSelect(v)} style={{background:selected===v?color:C.card2,color:selected===v?'#1c1c1e':C.muted,border:`1.5px solid ${selected===v?color:C.border}`,borderRadius:20,padding:'6px 14px',fontSize:13,cursor:'pointer',fontWeight:selected===v?700:500}}>{v}</button>))}</div>);}
function RowBtns({onEdit,onDel}){return(<div style={{display:'flex',gap:7}}><button onClick={onEdit} style={{background:C.card2,border:'none',borderRadius:10,padding:'5px 12px',fontSize:12,cursor:'pointer',color:C.blue,fontWeight:700}}>編輯</button><button onClick={onDel} style={{background:C.redBg,border:'none',borderRadius:10,padding:'5px 12px',fontSize:12,cursor:'pointer',color:C.red,fontWeight:700}}>刪除</button></div>);}
function Toggle({on,onChange,label,sub}){return(<div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}><div><div style={{fontSize:14,fontWeight:600,color:C.txt}}>{label}</div>{sub&&<div style={{fontSize:12,color:C.muted,marginTop:2}}>{sub}</div>}</div><div onClick={()=>onChange(!on)} style={{width:50,height:28,borderRadius:14,background:on?C.yellow:C.border,cursor:'pointer',position:'relative',transition:'background .2s'}}><div style={{position:'absolute',top:3,left:on?24:3,width:22,height:22,borderRadius:'50%',background:'white',boxShadow:'0 1px 4px rgba(0,0,0,0.2)',transition:'left .2s'}}/></div></div>);}

// ── Modals ────────────────────────────────────
function StockModal({initial,onClose,onSave}){
  const [mkt,setMkt]=useState(initial?.market||'TW');
  const [sym,setSym]=useState(initial?.symbol||'');
  const [name,setName]=useState(initial?.name||'');
  const [qty,setQty]=useState(String(initial?.qty||''));
  const [cost,setCost]=useState(String(initial?.cost||''));
  const ok=sym.trim()&&+qty>0&&+cost>0;
  const PRESETS=mkt==='TW'?[['2330','台積電'],['2317','鴻海'],['2454','聯發科'],['2308','台達電'],['0050','元大50'],['2881','富邦金']]:[['AAPL','Apple'],['NVDA','Nvidia'],['MSFT','Microsoft'],['GOOGL','Google'],['TSLA','Tesla']];
  return(<Modal title={initial?'編輯股票':'新增股票'} onClose={onClose}><div style={{display:'flex',gap:10,marginBottom:18}}>{[['TW','🇹🇼 台股'],['US','🇺🇸 美股']].map(([v,l])=>(<button key={v} onClick={()=>{setMkt(v);setSym('');setName('');}} style={{flex:1,padding:'11px',borderRadius:14,border:`2px solid ${mkt===v?C.yellow:C.border}`,background:mkt===v?C.yellowLight:'white',color:mkt===v?C.yellowDark:C.muted,fontWeight:700,cursor:'pointer',fontSize:14}}>{l}</button>))}</div><div style={{display:'flex',flexWrap:'wrap',gap:7,marginBottom:18}}>{PRESETS.map(([s,n])=>(<button key={s} onClick={()=>{setSym(s);setName(n);}} style={{background:sym===s?C.yellow:C.card2,color:sym===s?'#1c1c1e':C.txt,border:'none',borderRadius:20,padding:'6px 13px',fontSize:13,cursor:'pointer',fontWeight:sym===s?700:400}}>{s} {n}</button>))}</div><Field label="股票代號" value={sym} onChange={v=>setSym(v.toUpperCase())} placeholder={mkt==='TW'?'e.g. 2330':'e.g. AAPL'}/><Field label="名稱（選填）" value={name} onChange={setName} placeholder={mkt==='TW'?'e.g. 台積電':'e.g. Apple'}/><Field label="持股數量" value={qty} onChange={setQty} type="number" placeholder="e.g. 1000" suffix="股"/><Field label="平均成本" value={cost} onChange={setCost} type="number" placeholder={mkt==='TW'?'e.g. 850':'e.g. 150'} suffix={mkt==='TW'?'TWD':'USD'}/><div style={{display:'flex',gap:10,marginTop:4}}><GBtn onClick={onClose} color={C.faint} style={{flex:1}}>取消</GBtn><Btn onClick={()=>ok&&onSave({symbol:sym.trim(),name:name.trim()||sym.trim(),market:mkt,qty:+qty,cost:+cost})} disabled={!ok} style={{flex:2}}>確認</Btn></div></Modal>);
}
const FP_LIST=[{symbol:'TX',name:'台指期（大台）',mult:200},{symbol:'MTX',name:'小台指',mult:50},{symbol:'TE',name:'電子期',mult:4000},{symbol:'TF',name:'金融期',mult:1000}];
function FutureModal({initial,onClose,onSave}){
  const [sym,setSym]=useState(initial?.symbol||'TX');
  const [name,setName]=useState(initial?.name||'台指期（大台）');
  const [dir,setDir]=useState(initial?.dir||'long');
  const [lots,setLots]=useState(String(initial?.lots||''));
  const [entry,setEntry]=useState(String(initial?.entry||''));
  const [mult,setMult]=useState(String(initial?.mult||200));
  const [mgn,setMgn]=useState(String(initial?.margin||''));
  const ok=sym.trim()&&+lots>0&&+entry>0;
  return(<Modal title={initial?'編輯期貨':'新增期貨部位'} onClose={onClose}><div style={{display:'flex',flexWrap:'wrap',gap:7,marginBottom:8}}>{FP_LIST.map(p=>(<button key={p.symbol} onClick={()=>{setSym(p.symbol);setName(p.name);setMult(String(p.mult));}} style={{background:sym===p.symbol?C.yellow:C.card2,color:sym===p.symbol?'#1c1c1e':C.txt,border:'none',borderRadius:20,padding:'6px 13px',fontSize:13,cursor:'pointer',fontWeight:sym===p.symbol?700:400}}>{p.symbol} {p.name}</button>))}</div><div style={{fontSize:12,color:C.faint,marginBottom:16}}>個股期貨請輸入股票代號，乘數填 2000</div><Field label="商品代號" value={sym} onChange={setSym} placeholder="e.g. TX 或 2330"/><Field label="商品名稱" value={name} onChange={setName} placeholder="e.g. 台指期"/><div style={{display:'flex',gap:10,marginBottom:16}}>{[['long','🔼 做多'],['short','🔽 做空']].map(([v,l])=>(<button key={v} onClick={()=>setDir(v)} style={{flex:1,padding:'11px',borderRadius:14,fontWeight:700,cursor:'pointer',fontSize:14,border:`2px solid ${dir===v?(v==='long'?C.green:C.red):C.border}`,background:dir===v?(v==='long'?C.greenBg:C.redBg):'white',color:dir===v?(v==='long'?C.green:C.red):C.muted}}>{l}</button>))}</div><div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}><Field label="口數" value={lots} onChange={setLots} type="number" placeholder="e.g. 2" suffix="口"/><Field label="進場均價" value={entry} onChange={setEntry} type="number" placeholder="e.g. 22000"/></div><Field label="每點乘數" value={mult} onChange={setMult} type="number" suffix="TWD/點" hint="大台=200 / 小台=50 / 個股期=2000"/><Field label="保證金（選填）" value={mgn} onChange={setMgn} type="number" placeholder="e.g. 167000" suffix="TWD"/><div style={{display:'flex',gap:10,marginTop:4}}><GBtn onClick={onClose} color={C.faint} style={{flex:1}}>取消</GBtn><Btn onClick={()=>ok&&onSave({symbol:sym.trim(),name:name.trim()||sym.trim(),dir,lots:+lots,entry:+entry,mult:+mult,margin:mgn?+mgn:0})} disabled={!ok} color={C.orange} tc="white" style={{flex:2}}>確認</Btn></div></Modal>);
}
function CashModal({initial,onClose,onSave}){
  const [label,setLabel]=useState(initial?.label||'');const [amount,setAmount]=useState(String(initial?.amount||''));const [ccy,setCcy]=useState(initial?.ccy||'TWD');const ok=label.trim()&&+amount>0;
  return(<Modal title={initial?'編輯現金':'新增現金'} onClose={onClose}><Chips items={['台幣現金','美元現金','歐元現金','日圓現金','活存/定存','備用金']} selected={label} onSelect={v=>{setLabel(v);setCcy(v==='美元現金'?'USD':v==='歐元現金'?'EUR':v==='日圓現金'?'JPY':'TWD');}}/><Field label="名稱" value={label} onChange={setLabel} placeholder="e.g. 台幣現金"/><Sel label="幣別" value={ccy} onChange={setCcy} opts={CCY_OPTS}/><Field label="金額" value={amount} onChange={setAmount} type="number" placeholder="e.g. 500000" suffix={ccy}/><div style={{display:'flex',gap:10,marginTop:4}}><GBtn onClick={onClose} color={C.faint} style={{flex:1}}>取消</GBtn><Btn onClick={()=>ok&&onSave({label:label.trim(),amount:+amount,ccy})} disabled={!ok} color={C.green} tc="white" style={{flex:2}}>確認</Btn></div></Modal>);
}
function LiabModal({initial,onClose,onSave}){
  const [label,setLabel]=useState(initial?.label||'');const [amount,setAmount]=useState(String(initial?.amount||''));const [ccy,setCcy]=useState(initial?.ccy||'TWD');const [rate,setRate]=useState(String(initial?.rate||''));const ok=label.trim()&&+amount>0;
  return(<Modal title={initial?'編輯負債':'新增負債'} onClose={onClose}><Chips items={['房貸','車貸','信貸','信用卡','股票質押']} selected={label} onSelect={setLabel} color={C.red}/><Field label="名稱" value={label} onChange={setLabel} placeholder="e.g. 房貸"/><Sel label="幣別" value={ccy} onChange={setCcy} opts={CCY_OPTS}/><Field label="未償餘額" value={amount} onChange={setAmount} type="number" placeholder="e.g. 5000000" suffix={ccy}/><Field label="年利率（選填）" value={rate} onChange={setRate} type="number" placeholder="e.g. 2.6" suffix="%" hint="僅供顯示"/><div style={{display:'flex',gap:10,marginTop:4}}><GBtn onClick={onClose} color={C.faint} style={{flex:1}}>取消</GBtn><Btn onClick={()=>ok&&onSave({label:label.trim(),amount:+amount,ccy,rate:rate?+rate:null})} disabled={!ok} color={C.red} tc="white" style={{flex:2}}>確認</Btn></div></Modal>);
}
function OtherModal({initial,onClose,onSave}){
  const [label,setLabel]=useState(initial?.label||'');const [amount,setAmount]=useState(String(initial?.amount||''));const [ccy,setCcy]=useState(initial?.ccy||'TWD');const [note,setNote]=useState(initial?.note||'');const ok=label.trim()&&+amount>0;
  return(<Modal title={initial?'編輯其他資產':'新增其他資產'} onClose={onClose}><Chips items={['不動產','汽車','黃金','退休金','保險現金值']} selected={label} onSelect={setLabel} color={C.purple}/><Field label="資產名稱" value={label} onChange={setLabel} placeholder="e.g. 台北市不動產"/><Sel label="幣別" value={ccy} onChange={setCcy} opts={CCY_OPTS}/><Field label="估計現值" value={amount} onChange={setAmount} type="number" placeholder="e.g. 15000000" suffix={ccy}/><Field label="備註（選填）" value={note} onChange={setNote} placeholder="e.g. 大安區，2房"/><div style={{display:'flex',gap:10,marginTop:4}}><GBtn onClick={onClose} color={C.faint} style={{flex:1}}>取消</GBtn><Btn onClick={()=>ok&&onSave({label:label.trim(),amount:+amount,ccy,note:note.trim()})} disabled={!ok} color={C.purple} tc="white" style={{flex:2}}>確認</Btn></div></Modal>);
}

// ── Settings Modal ────────────────────────────
function SettingsModal({fugleKey,setFugleKey,gasUrl,setGasUrl,ghToken,setGhToken,gistId,setGistId,autoSave,setAutoSave,onClose}){
  const [fk,  setFk  ] = useState(fugleKey||'');
  const [gas, setGas ] = useState(gasUrl||'');
  const [gt,  setGt  ] = useState(ghToken||'');
  const [gi,  setGi  ] = useState(gistId||'');
  const [asEn,setAsEn] = useState(autoSave.enabled);
  const [asTime,setAsTime] = useState(autoSave.time||'08:00');
  const save = () => {
    ls.set(SK.key,  fk.trim());  setFugleKey(fk.trim());
    ls.set(SK.gas,  gas.trim()); setGasUrl(gas.trim());
    ls.set(SK.gh,   gt.trim());  setGhToken(gt.trim());
    ls.set(SK.gist, gi.trim());  setGistId(gi.trim());
    const as={enabled:asEn,time:asTime}; ls.set(SK.auto,as); setAutoSave(as);
    onClose();
  };
  return(
    <Modal title="設定" onClose={onClose}>
      <div style={{fontSize:13,fontWeight:700,color:C.muted,textTransform:'uppercase',letterSpacing:0.5,marginBottom:12}}>📈 報價來源</div>
      <Field label="Fugle API Key" value={fk} onChange={setFk} pw
        placeholder="xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx"
        hint="台股與指數即時報價。申請：developer.fugle.tw"/>
      <Field label="Google Apps Script URL" value={gas} onChange={setGas}
        placeholder="https://script.google.com/macros/s/xxx/exec"
        hint="美股收盤價 ＆ 匯率（USD/EUR/JPY/HKD）。透過 GAS 代理 Yahoo Finance。"/>
      <div style={{background:C.yellowLight,border:`1px solid #f0d888`,borderRadius:12,padding:12,marginBottom:14,fontSize:12,color:C.yellowDark,lineHeight:1.8}}>
        <b>GAS 設定步驟：</b><br/>
        1. 前往 <b>script.google.com</b> → 新增專案<br/>
        2. 貼上代理程式碼（見 App README）<br/>
        3. 部署 → 網頁應用程式 → 存取權「<b>所有人</b>」<br/>
        4. 複製部署 URL 貼到上方欄位
      </div>

      <div style={{fontSize:13,fontWeight:700,color:C.muted,textTransform:'uppercase',letterSpacing:0.5,marginBottom:12,marginTop:4}}>⏰ 自動更新 & 儲存</div>
      <Card style={{marginBottom:14,boxShadow:'none',border:`1.5px solid ${C.border}`,padding:'14px 16px'}}>
        <Toggle on={asEn} onChange={setAsEn} label="每日自動更新報價並儲存快照" sub="App 開啟時於指定時間自動執行"/>
        {asEn&&(<div style={{marginTop:12}}>
          <div style={{fontSize:12,color:C.muted,marginBottom:6,fontWeight:700,textTransform:'uppercase',letterSpacing:0.5}}>每日執行時間</div>
          <input type="time" value={asTime} onChange={e=>setAsTime(e.target.value)}
            style={{width:'100%',background:C.card2,border:`1.5px solid ${C.border}`,borderRadius:12,padding:'12px 14px',color:C.txt,fontSize:16,fontWeight:700}}/>
          <div style={{fontSize:12,color:C.faint,marginTop:6,lineHeight:1.5}}>需保持 App 開啟。同日若已有快照則覆蓋。若有設定 Gist 則同步自動上傳。</div>
        </div>)}
      </Card>

      <div style={{fontSize:13,fontWeight:700,color:C.muted,textTransform:'uppercase',letterSpacing:0.5,marginBottom:12}}>☁️ Gist 雲端同步</div>
      <div style={{background:C.yellowLight,border:`1px solid #f0d888`,borderRadius:12,padding:12,marginBottom:14,fontSize:13,color:C.yellowDark,lineHeight:1.6}}>
        github.com → Settings → Developer settings → Personal access tokens → 勾選 <b>gist</b> 權限
      </div>

// ── Chart ─────────────────────────────────────
function NWChart({entries}){
  if(entries.length<2)return<div style={{textAlign:'center',color:C.muted,padding:'16px 0',fontSize:13}}>需至少 2 筆記錄才能顯示走勢</div>;
  const W=340,H=150,PL=8,PR=8,PT=14,PB=28;const cW=W-PL-PR,cH=H-PT-PB;
  const vals=entries.map(([,v])=>v.nw);const mn=Math.min(...vals),mx=Math.max(...vals),rng=mx-mn||1;
  const toX=i=>PL+(i/(entries.length-1))*cW;const toY=v=>PT+cH-((v-mn)/rng)*cH;
  const pts=entries.map(([,v],i)=>({x:toX(i),y:toY(v.nw)}));
  const poly=pts.map(p=>p.x+','+p.y).join(' ');const area=PL+','+(PT+cH)+' '+poly+' '+toX(entries.length-1)+','+(PT+cH);
  const col=vals[vals.length-1]>=vals[0]?C.yellow:C.red;
  const n=entries.length;const lbls=n<=6?entries.map((_,i)=>i):[0,Math.floor(n/4),Math.floor(n/2),Math.floor(3*n/4),n-1];
  return(<svg viewBox={'0 0 '+W+' '+H} style={{width:'100%',display:'block'}}><defs><linearGradient id="gr" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={col} stopOpacity="0.3"/><stop offset="100%" stopColor={col} stopOpacity="0"/></linearGradient></defs><polygon points={area} fill="url(#gr)"/><polyline points={poly} fill="none" stroke={col} strokeWidth="2.5" strokeLinejoin="round" strokeLinecap="round"/><circle cx={pts[0].x} cy={pts[0].y} r="4" fill={col}/><circle cx={pts[pts.length-1].x} cy={pts[pts.length-1].y} r="5" fill={col}/>{lbls.map(i=>(<text key={i} x={toX(i)} y={H-6} textAnchor="middle" style={{fontSize:9,fill:C.muted}}>{entries[i][0].slice(5)}</text>))}<text x={PL} y={PT+cH-2} textAnchor="start" style={{fontSize:9,fill:C.faint}}>{(mn/1e6).toFixed(1)}M</text><text x={PL} y={PT+10} textAnchor="start" style={{fontSize:9,fill:C.faint}}>{(mx/1e6).toFixed(1)}M</text></svg>);
}

        <div style={{display:'flex',gap:6,marginBottom:14}}>{RANGES.map(r=>(<button key={r.k} onClick={()=>{setRange(r.k);setPage(0);}} style={{flex:1,padding:'6px 4px',borderRadius:10,border:`1.5px solid ${range===r.k?C.yellow:C.border}`,background:range===r.k?C.yellowLight:'white',color:range===r.k?C.yellowDark:C.muted,fontSize:12,fontWeight:range===r.k?700:500,cursor:'pointer'}}>{r.label}</button>))}</div>
        <NWChart entries={chartEntries}/>
        {filtered.length>=2&&<div style={{marginTop:12,display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:8}}>{[['期初',statsFirst?'NT$'+fmt(statsFirst[1].nw):'-'],['期末',statsLast?'NT$'+fmt(statsLast[1].nw):'-'],['變化',periodChg!=null?(periodChg>=0?'+':'')+fmt(periodChg):'-',periodChg>=0?C.green:C.red],['漲跌幅',periodPct!=null?(periodPct>=0?'+':'')+periodPct.toFixed(1)+'%':'-',periodPct>=0?C.green:C.red],['區間高','NT$'+fmt(periodHigh)],['區間低','NT$'+fmt(periodLow)],['筆數',filtered.length+' 筆'],['天數',selRange.days?selRange.days+'d':'全部']].map(([l,v,col])=>(<div key={l} style={{background:C.card2,borderRadius:10,padding:'8px 10px'}}><div style={{fontSize:10,color:C.muted,marginBottom:3,fontWeight:600}}>{l}</div><div style={{fontSize:12,fontWeight:700,color:col||C.txt}}>{v}</div></div>))}</div>}
      </Card>}
      <Card style={{marginBottom:12,background:ghToken?C.yellowLight:C.card,border:`1.5px solid ${ghToken?'#f0d888':C.border}`}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:ghToken?12:0}}><div><div style={{fontSize:14,fontWeight:700,color:ghToken?C.yellowDark:C.muted}}>{ghToken?'☁️ GitHub Gist 同步':'☁️ 雲端同步未設定'}</div>{gistId&&<div style={{fontSize:11,color:C.muted,marginTop:2}}>Gist: {gistId.slice(0,10)}…</div>}{!ghToken&&<div style={{fontSize:12,color:C.muted,marginTop:2}}>在設定中填入 GitHub Token 以啟用</div>}</div>{!ghToken&&<div style={{fontSize:24}}>🔒</div>}</div>
        {ghToken&&<div style={{display:'flex',gap:9}}><Btn onClick={onPush} disabled={!!syncing} color={C.yellow} style={{flex:1,fontSize:13,padding:'10px 12px'}}>{syncing==='push'?'上傳中…':'⬆ 上傳'}</Btn><Btn onClick={onPull} disabled={!!syncing||!gistId} color={C.yellowDark} tc="white" style={{flex:1,fontSize:13,padding:'10px 12px'}}>{syncing==='pull'?'下載中…':'⬇ 下載'}</Btn></div>}
        {syncStatus&&<div style={{fontSize:12,marginTop:10,color:syncStatus.ok?C.green:C.red,fontWeight:600}}>{syncStatus.ok?'✅':'❌'} {syncStatus.msg}</div>}
      </Card>
      {allEntries.length===0&&<div style={{textAlign:'center',color:C.muted,paddingTop:40}}><div style={{fontSize:48,marginBottom:14}}>📊</div><div style={{fontSize:15,fontWeight:600}}>尚無記錄</div><div style={{fontSize:13,marginTop:6}}>更新報價後點上方按鈕儲存</div></div>}
      {filtered.length>0&&<Card>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}><div style={{fontSize:13,fontWeight:600,color:C.muted}}>歷史記錄 · {filtered.length} 筆</div>
          {totalPages>1&&<div style={{display:'flex',alignItems:'center',gap:8}}><button onClick={()=>setPage(p=>Math.max(0,p-1))} disabled={page===0} style={{background:C.card2,border:'none',borderRadius:8,width:28,height:28,cursor:page===0?'not-allowed':'pointer',color:page===0?C.faint:C.txt,fontWeight:700,fontSize:14,opacity:page===0?0.4:1}}>‹</button><span style={{fontSize:12,color:C.muted}}>{page+1}/{totalPages}</span><button onClick={()=>setPage(p=>Math.min(totalPages-1,p+1))} disabled={page===totalPages-1} style={{background:C.card2,border:'none',borderRadius:8,width:28,height:28,cursor:page===totalPages-1?'not-allowed':'pointer',color:page===totalPages-1?C.faint:C.txt,fontWeight:700,fontSize:14,opacity:page===totalPages-1?0.4:1}}>›</button></div>}
        </div>
        {paged.map(([date,v],i)=>{const ne=i<paged.length-1?paged[i+1]:filtered[page*PAGE_SIZE+i+1];const ch=ne?v.nw-ne[1].nw:null;return(<div key={date}>{i>0&&<Div/>}<div style={{padding:'12px 0',display:'flex',justifyContent:'space-between',alignItems:'center'}}><div><div style={{display:'flex',alignItems:'center',gap:8}}><span style={{fontWeight:700,fontSize:14}}>{date}</span>{date===today&&<Pill label="今日"/>}</div><div style={{fontSize:12,color:C.muted,marginTop:3}}>資產 {fmt(v.ta/1e6,2)}M · 負債 {fmt(v.tl/1e6,2)}M</div>{v.usdTwd&&<div style={{fontSize:11,color:C.faint,marginTop:1}}>USD/TWD {(+v.usdTwd).toFixed(2)}</div>}</div><div style={{display:'flex',alignItems:'center',gap:9}}><div style={{textAlign:'right'}}><div style={{fontWeight:800,fontSize:15}}>NT${fmt(v.nw)}</div>{ch!=null&&<div style={{fontSize:12,marginTop:2}}><Pnl v={ch}/></div>}</div><button onClick={()=>delRec(date)} style={{background:C.redBg,border:'none',borderRadius:10,padding:'5px 10px',fontSize:12,cursor:'pointer',color:C.red,fontWeight:700}}>刪</button></div></div></div>);})}
      </Card>}
    </div></div>
  );
}

// ── Tab Icons ─────────────────────────────────
const TABS=[
  {k:'overview',l:'總覽',icon:a=><svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke={a?C.yellow:C.faint} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>},
  {k:'stocks', l:'股票',icon:a=><svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke={a?C.yellow:C.faint} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>},
  {k:'futures',l:'期貨',icon:a=><svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke={a?C.yellow:C.faint} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="2" x2="12" y2="22"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>},
  {k:'cash',   l:'現金',icon:a=><svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke={a?C.yellow:C.faint} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="2" y="6" width="20" height="12" rx="2"/><circle cx="12" cy="12" r="3"/><path d="M6 12h.01M18 12h.01"/></svg>},
  {k:'other',  l:'資產',icon:a=><svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke={a?C.yellow:C.faint} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>},
  {k:'liab',   l:'負債',icon:a=><svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke={a?C.yellow:C.faint} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>},
  {k:'records',l:'記錄',icon:a=><svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke={a?C.yellow:C.faint} strokeWidth="2.5" strokeLinecap="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>},
];

// ── Main App ──────────────────────────────────
function App(){
  const [tab,setTab]           = useState('overview');
  const [stocks,setStocks]     = useState(()=>ls.get(SK.s)||[]);
  const [futures,setFutures]   = useState(()=>ls.get(SK.f)||[]);
  const [cash,setCash]         = useState(()=>ls.get(SK.c)||[]);
  const [liab,setLiab]         = useState(()=>ls.get(SK.l)||[]);
  const [other,setOther]       = useState(()=>ls.get(SK.o)||[]);
  const [fugleKey,setFugleKey] = useState(()=>ls.get(SK.key)||'');
  const [gasUrl,setGasUrl]     = useState(()=>ls.get(SK.gas)||'');
  const [rates,setRates]       = useState(()=>{ const s=ls.get(SK.rates); if(s)return s; const u=ls.get('ptf:fx')||32; return {...DEF_RATES,USD:u}; });
  const [records,setRecords]   = useState(()=>ls.get(SK.r)||{});
  const [ghToken,setGhToken]   = useState(()=>ls.get(SK.gh)||'');
  const [gistId,setGistId]     = useState(()=>ls.get(SK.gist)||'');
  const [autoSave,setAutoSave] = useState(()=>ls.get(SK.auto)||{enabled:false,time:'08:00'});
  const [refreshing,setRef]    = useState(false);
  const [refStatus,setRS]      = useState('');
  const [lastUp,setLU]         = useState(null);
  const [modal,setModal]       = useState(null);
  const [err,setErr]           = useState('');
  const [syncing,setSyncing]   = useState(false);
  const [syncSt,setSyncSt]     = useState(null);
  const [hidden,setHidden]     = useState(true);
  const [pendingAS,setPAS]     = useState(false);
  const [lastASMsg,setLAM]     = useState('');

  useEffect(()=>ls.set(SK.s,stocks),[stocks]);
  useEffect(()=>ls.set(SK.f,futures),[futures]);
  useEffect(()=>ls.set(SK.c,cash),[cash]);
  useEffect(()=>ls.set(SK.l,liab),[liab]);
  useEffect(()=>ls.set(SK.o,other),[other]);
  useEffect(()=>ls.set(SK.r,records),[records]);
  useEffect(()=>ls.set(SK.rates,rates),[rates]);

  const stateRef=useRef({});
  useEffect(()=>{ stateRef.current={stocks,futures,cash,liab,other,rates,fugleKey,gasUrl,ghToken,gistId,records}; });

  // Auto-save trigger after refresh completes
  useEffect(()=>{
    if(!pendingAS||refreshing)return;
    setPAS(false);
    const today=new Date().toISOString().slice(0,10);
    const{ta,tl,nw}=calcNW(stocks,futures,cash,liab,other,rates);
    const next={...records,[today]:{nw,ta,tl,usdTwd:rates.USD,ts:Date.now()}};
    setRecords(next);ls.set(SK.r,next);
    setLAM('自動儲存 '+new Date().toLocaleTimeString('zh-TW'));
    if(ghToken){const body=buildPayload(next,stocks,futures,cash,liab,other);pushGistRaw(body,ghToken,gistId).then(id=>{if(id&&id!==gistId){setGistId(id);ls.set(SK.gist,id);}}).catch(()=>{});}
  },[pendingAS,refreshing]);

  // Auto-save timer
  const asDoneRef=useRef({date:null});
  useEffect(()=>{
    if(!autoSave.enabled)return;
    const check=()=>{
      const now=new Date();const hhmm=now.getHours().toString().padStart(2,'0')+':'+now.getMinutes().toString().padStart(2,'0');const today=now.toISOString().slice(0,10);
      if(hhmm===autoSave.time&&asDoneRef.current.date!==today){
        asDoneRef.current.date=today;
        const st=stateRef.current;if(!st.fugleKey||(st.stocks.length===0&&st.futures.length===0))return;
        setPAS(true);doRefresh();
      }
    };
    const id=setInterval(check,30000);return()=>clearInterval(id);
  },[autoSave.enabled,autoSave.time]);

  function buildPayload(recs,s,f,c,l,o){return JSON.stringify({stocks:s.map(x=>({...x,px:undefined})),futures:f.map(x=>({...x,px:undefined})),cash:c,liabilities:l,otherAssets:o,records:recs},null,2);}
  async function pushGistRaw(payload,token,id){
    if(id){const r=await fetch('https://api.github.com/gists/'+id,{method:'PATCH',headers:{'Authorization':'token '+token,'Content-Type':'application/json'},body:JSON.stringify({files:{[GFILE]:{content:payload}}})});if(!r.ok)throw new Error('GitHub '+r.status);return id;}
    else{const r=await fetch('https://api.github.com/gists',{method:'POST',headers:{'Authorization':'token '+token,'Content-Type':'application/json'},body:JSON.stringify({description:'資產負債組合',public:false,files:{[GFILE]:{content:payload}}})});if(!r.ok)throw new Error('GitHub '+r.status);const d=await r.json();return d.id;}
  }

  async function fugleQ(sym){
    const r=await fetch('https://api.fugle.tw/marketdata/v1.0/stock/intraday/quote/'+sym,{headers:{'X-API-KEY':fugleKey}});
    if(!r.ok)throw new Error('HTTP '+r.status);
    const d=await r.json();const px=d.closePrice??d.lastPrice??d.previousClose;
    if(px==null)throw new Error('無報價');return px;
  }

  async function doRefresh(){
    if(refreshing||(stocks.length===0&&futures.length===0))return;
    if(!fugleKey){setErr('請先在設定中填入 Fugle API Key');return;}
    setRef(true);setErr('');const errs=[],pm={};

    // 台股 via Fugle
    const twS=stocks.filter(s=>s.market==='TW');
    for(let i=0;i<twS.length;i++){
      const s=twS[i];setRS('台股 '+s.symbol+' '+(i+1)+'/'+twS.length);
      try{pm[s.symbol+'.TW']=await fugleQ(s.symbol);}catch(e){errs.push(s.symbol+': '+e.message);}
    }

    // 期貨 via Fugle（現貨指數替代）
    const uniqF=[...new Set(futures.map(f=>f.symbol))];
    for(let i=0;i<uniqF.length;i++){
      const fs=uniqF[i];const sp=FUT_SPOT[fs]||fs;setRS('期貨 '+fs+' '+(i+1)+'/'+uniqF.length);
      try{pm[fs]=await fugleQ(sp);}catch(e){errs.push(fs+': '+e.message);}
    }

    // 美股 + 匯率 via Google Apps Script → Yahoo Finance
    const usS=stocks.filter(s=>s.market==='US');
    const fxSyms=['TWD=X','EURTWD=X','JPYTWD=X','HKDTWD=X'];
    const yahooSyms=[...usS.map(s=>s.symbol),...fxSyms];

    if(gasUrl&&yahooSyms.length>0){
      setRS('美股 + 匯率…');
      try{
        const r=await fetch(gasUrl+'?symbols='+encodeURIComponent(yahooSyms.join(',')));
        if(!r.ok)throw new Error('GAS HTTP '+r.status);
        const data=await r.json();
        // 美股
        usS.forEach(s=>{if(data[s.symbol]!=null)pm[s.symbol]=data[s.symbol];});
        // 匯率
        const nr={...rates};
        if(data['TWD=X'])    nr.USD=+data['TWD=X'].toFixed(4);
        if(data['EURTWD=X']) nr.EUR=+data['EURTWD=X'].toFixed(4);
        if(data['JPYTWD=X']) nr.JPY=+data['JPYTWD=X'].toFixed(5);
        if(data['HKDTWD=X']) nr.HKD=+data['HKDTWD=X'].toFixed(4);
        setRates(nr);
      }catch(e){errs.push('GAS: '+e.message);}
    } else if(usS.length>0){
      errs.push('美股/匯率: 請在設定中填入 Google Apps Script URL');
    }

    setStocks(prev=>prev.map(s=>{const k=s.market==='TW'?s.symbol+'.TW':s.symbol;return k in pm?{...s,px:pm[k]}:s;}));
    setFutures(prev=>prev.map(f=>f.symbol in pm?{...f,px:pm[f.symbol]}:f));
    if(Object.keys(pm).length>0)setLU(new Date());
    if(errs.length>0)setErr('部分失敗：'+errs.join(' / '));
    setRS('');setRef(false);
  }

  async function saveRec(){
    const today=new Date().toISOString().slice(0,10);
    const{ta,tl,nw}=calcNW(stocks,futures,cash,liab,other,rates);
    const next={...records,[today]:{nw,ta,tl,usdTwd:rates.USD,ts:Date.now()}};
    setRecords(next);ls.set(SK.r,next);
    if(ghToken){try{const id=await pushGistRaw(buildPayload(next,stocks,futures,cash,liab,other),ghToken,gistId);if(id&&id!==gistId){setGistId(id);ls.set(SK.gist,id);}setSyncSt({ok:true,msg:'記錄已儲存並同步 '+new Date().toLocaleTimeString('zh-TW')});}catch(e){setSyncSt({ok:false,msg:'本機已儲存，Gist 失敗：'+e.message});}}
  }
  async function pushGist(){if(!ghToken)return;setSyncing('push');setSyncSt(null);try{const id=await pushGistRaw(buildPayload(records,stocks,futures,cash,liab,other),ghToken,gistId);if(id&&id!==gistId){setGistId(id);ls.set(SK.gist,id);}setSyncSt({ok:true,msg:'上傳成功 '+new Date().toLocaleTimeString('zh-TW')});}catch(e){setSyncSt({ok:false,msg:e.message});}setSyncing(false);}
  async function pullGist(){if(!ghToken||!gistId)return;setSyncing('pull');setSyncSt(null);try{const res=await fetch('https://api.github.com/gists/'+gistId,{headers:{'Authorization':'token '+ghToken}});if(!res.ok)throw new Error('GitHub '+res.status);const d=await res.json();const raw=d.files?.[GFILE]?.content;if(!raw)throw new Error('找不到資料');const data=JSON.parse(raw);if(data.stocks){setStocks(data.stocks);ls.set(SK.s,data.stocks);}if(data.futures){setFutures(data.futures);ls.set(SK.f,data.futures);}if(data.cash){setCash(data.cash);ls.set(SK.c,data.cash);}if(data.liabilities){setLiab(data.liabilities);ls.set(SK.l,data.liabilities);}if(data.otherAssets){setOther(data.otherAssets);ls.set(SK.o,data.otherAssets);}if(data.records){setRecords(data.records);ls.set(SK.r,data.records);}setSyncSt({ok:true,msg:'下載成功 '+new Date().toLocaleTimeString('zh-TW')});}catch(e){setSyncSt({ok:false,msg:e.message});}setSyncing(false);}

  const noData=stocks.length===0&&futures.length===0;
  const twS=stocks.filter(s=>s.market==='TW'),usS=stocks.filter(s=>s.market==='US');
  const fa=item=>{const sym=item.ccy==='TWD'?'NT$':item.ccy==='JPY'?'¥':item.ccy==='EUR'?'€':'$';const d=['USD','EUR'].includes(item.ccy)?2:0;return sym+fmt(item.amount,d);};
  const FAB={stocks:()=>setModal('addS'),futures:()=>setModal('addF'),cash:()=>setModal('addC'),other:()=>setModal('addO'),liab:()=>setModal('addL')};

  return(
    <div style={{background:C.bg,minHeight:'100vh',fontFamily:'-apple-system,BlinkMacSystemFont,sans-serif',color:C.txt,maxWidth:600,margin:'0 auto'}}>
      <div style={{background:'rgba(255,255,255,0.94)',backdropFilter:'blur(20px)',padding:'12px 16px',display:'flex',justifyContent:'space-between',alignItems:'center',borderBottom:`1px solid ${C.border}`,position:'sticky',top:0,zIndex:10}}>
        <div style={{fontSize:11,color:C.muted,fontWeight:500}}>{refStatus?<span style={{color:C.yellow,fontWeight:700}}>{refStatus}</span>:lastUp?'更新於 '+lastUp.toLocaleTimeString('zh-TW'):'尚未更新報價'}</div>
        <div style={{display:'flex',gap:9,alignItems:'center'}}>
          {!fugleKey&&<div style={{fontSize:11,color:C.orange,fontWeight:700,background:'#fff3e0',padding:'4px 10px',borderRadius:20}}>⚠ 請設定</div>}
          <button onClick={()=>setModal('settings')} style={{background:C.card2,border:`1px solid ${C.border}`,borderRadius:12,width:36,height:36,cursor:'pointer',fontSize:18,display:'flex',alignItems:'center',justifyContent:'center'}}>⚙️</button>
          <button onClick={doRefresh} disabled={refreshing||noData} style={{background:refreshing||noData?C.border:C.yellow,border:'none',borderRadius:12,padding:'8px 14px',cursor:refreshing||noData?'not-allowed':'pointer',fontSize:13,fontWeight:700,color:refreshing||noData?C.muted:'#1c1c1e',opacity:noData?0.5:1}}>{refreshing?'更新中…':'🔄 更新報價'}</button>
        </div>
      </div>
      {err&&<div style={{background:'#fff0ee',color:C.red,padding:'10px 18px',fontSize:13,display:'flex',justifyContent:'space-between',alignItems:'center',borderBottom:`1px solid #ffd7d5`}}><span style={{flex:1,fontWeight:500}}>{err}</span><button onClick={()=>setErr('')} style={{background:'none',border:'none',color:C.red,cursor:'pointer',fontSize:20,marginLeft:8,fontWeight:700}}>×</button></div>}
      <div style={{paddingBottom:120}}>
        {tab==='overview'&&<Overview stocks={stocks} twS={twS} usS={usS} futs={futures} cash={cash} liabilities={liab} otherAssets={other} rates={rates} setTab={setTab} hidden={hidden} toggleHidden={()=>setHidden(v=>!v)}/>}
        {tab==='stocks'  &&<StocksTab stocks={stocks} setStocks={setStocks} onEdit={s=>setModal({t:'editS',d:s})}/>}
        {tab==='futures' &&<FuturesTab futures={futures} setFutures={setFutures} onEdit={f=>setModal({t:'editF',d:f})}/>}
        {tab==='cash'    &&<ListTab items={cash} setItems={setCash} onEdit={c=>setModal({t:'editC',d:c})} title="現金" sub="存款 · 現金部位" emptyIcon="💵" emptyText="尚未新增現金" renderAmt={item=><span style={{color:C.green,fontWeight:800}}>{fa(item)}</span>} renderSub={item=>item.ccy} strip={[...CCY_OPTS.flatMap(([cy])=>{const t=cash.filter(c=>c.ccy===cy).reduce((s,c)=>s+c.amount,0);return t>0?[[cy,fa({amount:t,ccy:cy})]]:[]}),['筆數',cash.length+' 筆']]}/>}
        {tab==='other'   &&<ListTab items={other} setItems={setOther} onEdit={o=>setModal({t:'editO',d:o})} title="其他資產" sub="不動產 · 黃金 · 退休金" emptyIcon="🏠" emptyText="尚未新增其他資產" renderAmt={item=><span style={{color:C.purple,fontWeight:800}}>{fa(item)}</span>} renderSub={item=>item.note?item.ccy+' · '+item.note:item.ccy} strip={[['TWD 合計','NT$'+fmt(other.filter(o=>o.ccy==='TWD').reduce((s,o)=>s+o.amount,0))],['項目數',other.length+' 項']]}/>}
        {tab==='liab'    &&<ListTab items={liab} setItems={setLiab} onEdit={l=>setModal({t:'editL',d:l})} title="負債" sub="貸款 · 信用卡 · 質押" emptyIcon="💳" emptyText="尚無負債記錄" renderAmt={item=><span style={{color:C.red,fontWeight:800}}>{fa(item)}</span>} renderSub={item=>item.rate?item.ccy+' · 年利率 '+item.rate+'%':item.ccy} strip={[['負債總計 TWD','NT$'+fmt(liab.filter(l=>l.ccy==='TWD').reduce((s,l)=>s+l.amount,0)),C.red],...(liab.filter(l=>l.rate).length>0?[['加權利率',(liab.filter(l=>l.rate).reduce((s,l)=>s+l.rate*l.amount,0)/liab.filter(l=>l.rate).reduce((s,l)=>s+l.amount,1)).toFixed(2)+'%']]:[]),['筆數',liab.length+' 筆']]}/>}
        {tab==='records' &&<RecordsTab records={records} setRecords={setRecords} onSave={saveRec} onPush={pushGist} onPull={pullGist} syncing={syncing} syncStatus={syncSt} ghToken={ghToken} gistId={gistId} stocks={stocks} futures={futures} autoSave={autoSave} lastASMsg={lastASMsg}/>}
      </div>
      <div style={{position:'fixed',bottom:0,left:'50%',transform:'translateX(-50%)',width:'100%',maxWidth:600,background:'rgba(255,255,255,0.97)',backdropFilter:'blur(24px)',borderTop:`1px solid ${C.border}`,display:'flex',alignItems:'center',paddingBottom:'env(safe-area-inset-bottom,8px)',paddingTop:6,zIndex:10}}>
        {TABS.map(({k,l,icon})=>(<button key={k} onClick={()=>setTab(k)} style={{flex:1,padding:'4px 2px 4px',background:'none',border:'none',cursor:'pointer',display:'flex',flexDirection:'column',alignItems:'center',gap:3}}>{icon(tab===k)}<span style={{fontSize:10,fontWeight:tab===k?800:500,color:tab===k?C.yellow:C.faint,letterSpacing:-0.2}}>{l}</span></button>))}
      </div>
      {FAB[tab]&&<button onClick={FAB[tab]} style={{position:'fixed',bottom:72,right:'max(16px, calc(50vw - 284px))',zIndex:20,width:52,height:52,borderRadius:'50%',background:C.yellow,border:'none',cursor:'pointer',fontSize:24,boxShadow:'0 4px 20px rgba(245,183,49,0.5)',display:'flex',alignItems:'center',justifyContent:'center',color:'#1c1c1e',fontWeight:700}}>＋</button>}

      {modal==='settings' &&<SettingsModal fugleKey={fugleKey} setFugleKey={setFugleKey} gasUrl={gasUrl} setGasUrl={setGasUrl} ghToken={ghToken} setGhToken={setGhToken} gistId={gistId} setGistId={setGistId} autoSave={autoSave} setAutoSave={setAutoSave} onClose={()=>setModal(null)}/>}
      {modal==='addS'     &&<StockModal  onClose={()=>setModal(null)} onSave={s=>{setStocks(p=>[...p,{...s,id:Date.now(),px:null}]);setModal(null);}}/>}
      {modal?.t==='editS' &&<StockModal  initial={modal.d} onClose={()=>setModal(null)} onSave={s=>{setStocks(p=>p.map(x=>x.id===modal.d.id?{...x,...s}:x));setModal(null);}}/>}
      {modal==='addF'     &&<FutureModal onClose={()=>setModal(null)} onSave={f=>{setFutures(p=>[...p,{...f,id:Date.now(),px:null}]);setModal(null);}}/>}
      {modal?.t==='editF' &&<FutureModal initial={modal.d} onClose={()=>setModal(null)} onSave={f=>{setFutures(p=>p.map(x=>x.id===modal.d.id?{...x,...f}:x));setModal(null);}}/>}
      {modal==='addC'     &&<CashModal   onClose={()=>setModal(null)} onSave={c=>{setCash(p=>[...p,{...c,id:Date.now()}]);setModal(null);}}/>}
      {modal?.t==='editC' &&<CashModal   initial={modal.d} onClose={()=>setModal(null)} onSave={c=>{setCash(p=>p.map(x=>x.id===modal.d.id?{...x,...c}:x));setModal(null);}}/>}
      {modal==='addL'     &&<LiabModal   onClose={()=>setModal(null)} onSave={l=>{setLiab(p=>[...p,{...l,id:Date.now()}]);setModal(null);}}/>}
      {modal?.t==='editL' &&<LiabModal   initial={modal.d} onClose={()=>setModal(null)} onSave={l=>{setLiab(p=>p.map(x=>x.id===modal.d.id?{...x,...l}:x));setModal(null);}}/>}
      {modal==='addO'     &&<OtherModal  onClose={()=>setModal(null)} onSave={o=>{setOther(p=>[...p,{...o,id:Date.now()}]);setModal(null);}}/>}
      {modal?.t==='editO' &&<OtherModal  initial={modal.d} onClose={()=>setModal(null)} onSave={o=>{setOther(p=>p.map(x=>x.id===modal.d.id?{...x,...o}:x));setModal(null);}}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
